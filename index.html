<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Hairline&display=swap" rel="stylesheet">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="source.js" defer></script>
</head>
<body>
    <h1>TOP Calculator</h1>
    <div class="calculator-container">
        <div class="calculator-display">
            <p>Welcome to your calculator!  </p>
        </div>
        <div class="calculator-btns">
            <div class="calculator-digits">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>0</button>
            </div>
            <div class="calculator-functions">
                <button class="calculator-clear">C</button>
                <button class="calculator-operators">+</button>
                <button class="calculator-operators">-</button>
                <button class="calculator-operators">*</button>
                <button class="calculator-operators">/</button>
                <button class="caluclator-equals">=</button>
            </div>
        </div>
    </div>
</body>
<footer>
    <p>Created by Rúben Barbeiro | The Odin Project</p>
</footer>
</html>
